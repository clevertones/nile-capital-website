version: '3.9'
services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      - MMT_API_KEY=${MMT_API_KEY}
    volumes:
      - ./backend/transactions.db:/app/transactions.db

  frontend:
    build:
      context: ./mobile-money-tracker
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    ports:
      - '3000:3000'
    depends_on:
      - backend
