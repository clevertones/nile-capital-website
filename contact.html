<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — NiLe Capital Fund</title>
  <!-- Paste this in <head> before your style.css link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="contact">

  <!-- NAVIGATION BAR -->
  <nav class="navbar">
    <div class="logo">Ni<span>L</span>e Capital</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="contact.html" class="btn-invest">Invest With Us</a></li>
    </ul>
  </nav>

  <!-- CONTACT SECTION -->
  <section class="contact">
    <div class="section-header">
      <span class="eyebrow">CONTACT</span>
      <h1>Get In Touch</h1>
      <p class="page-subtext">Ready to invest with us? Contact us today!</p>
    </div>
    <form class="contact-form">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <select name="investment" class="form-input" required>
        <option value="" disabled selected>Intended Investment Amount</option>
        <option>$25,000 – $50,000</option>
        <option>$50,000 – $100,000</option>
        <option>$100,000 – $250,000</option>
        <option>$250,000+</option>
      </select>
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>
    <div class="contact-info">
      <p><strong>Email:</strong> clever@nilecapital.com</p>
      <p><strong>Phone:</strong> +255 768 736 334</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 NiLe Capital Fund Limited · clever@nilecapital.com · +255 768 736 334</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
